<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>留言</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" data-i18n="nav.home">主页</a>
      <a href="chat.html" data-i18n="nav.chat">群聊</a>
      <a href="messages.html" data-i18n="nav.messages">留言</a>
      <a href="announcements.html" data-i18n="nav.announcements">公告</a>
      <div class="lang-switch">
        <button id="lang-zh">中文</button>
        <button id="lang-en">EN</button>
      </div>
    </nav>
  </header>

  <main>
    <h1 data-i18n="messages.title">留言板</h1>

    <section id="messages-list"></section>

    <form id="message-form">
      <input id="msg-name" placeholder="姓名" required />
      <textarea id="msg-content" placeholder="留言" required></textarea>
      <button type="submit" data-i18n="messages.submit">提交</button>
    </form>
  </main>

  <script src="assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      App.init();
      Messages && Messages.init && Messages.init();
    });
  </script>
</body>
</html>
