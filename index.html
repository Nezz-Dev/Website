<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>主页 - Server</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="brand">Server</div>
      <a href="index.html" data-i18n="nav.home">主页</a>
      <a href="chat.html" data-i18n="nav.chat">群聊</a>
      <a href="announcements.html" data-i18n="nav.announcements">公告</a>
      <div class="lang-switch">
        <button id="lang-zh">中文</button>
        <button id="lang-en">EN</button>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="left">
        <h1 data-i18n="home.title">服务器信息</h1>
        <p class="muted">快速查看服务器版本与运行状态</p>
        <div class="cta">
          <a class="btn" href="chat.html" data-i18n="home.gotoChat">进入群聊</a>
        </div>
      </div>
      <div class="right server-card card">
        <div><strong data-i18n="home.version">版本：</strong><span id="server-version">—</span></div>
        <div class="small"><strong data-i18n="home.uptime">运行时间：</strong><span id="server-uptime">—</span></div>
      </div>
    </section>

    <div class="grid">
      <div class="card">
        <h3 data-i18n="ann.title">公告</h3>
        <div class="ann-list" id="ann-preview"></div>
        <a href="announcements.html" class="small muted">查看全部 →</a>
      </div>
      <div class="card">
        <h3>社群</h3>
        <p class="muted">加入我们的群聊获取最新消息与支持。</p>
        <a href="chat.html" class="btn" style="margin-top:12px">加入群聊</a>
      </div>
      <div class="card">
        <h3>资源</h3>
        <p class="muted">文档、下载与帮助中心。</p>
      </div>
    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    // Page-specific initialization
    document.addEventListener('DOMContentLoaded', function(){
      App.init();
      App.loadServerInfo();
    });
  </script>
</body>
</html>
