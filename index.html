<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>主页 - Server</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" data-i18n="nav.home">主页</a>
      <a href="chat.html" data-i18n="nav.chat">群聊</a>
      <a href="announcements.html" data-i18n="nav.announcements">公告</a>
      <div class="lang-switch">
        <button id="lang-zh">中文</button>
        <button id="lang-en">EN</button>
      </div>
    </nav>
  </header>

  <main>
    <h1 data-i18n="home.title">服务器信息</h1>
    <section id="server-info">
      <p><strong data-i18n="home.version">版本：</strong><span id="server-version">—</span></p>
      <p><strong data-i18n="home.uptime">运行时间：</strong><span id="server-uptime">—</span></p>
    </section>

    <section>
      <h2 data-i18n="home.quick">快速链接</h2>
      <ul>
        <li><a href="chat.html" data-i18n="home.gotoChat">进入群聊</a></li>
        <li><a href="announcements.html" data-i18n="home.gotoAnnouncements">查看公告</a></li>
      </ul>
    </section>
  </main>

  <script src="assets/app.js"></script>
  <script>
    // Page-specific initialization
    document.addEventListener('DOMContentLoaded', function(){
      App.init();
      App.loadServerInfo();
    });
  </script>
</body>
</html>
