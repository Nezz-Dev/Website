<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>群聊</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" data-i18n="nav.home">主页</a>
      <a href="chat.html" data-i18n="nav.chat">群聊</a>
      <!-- messages link removed -->
      <a href="announcements.html" data-i18n="nav.announcements">公告</a>
      <div class="lang-switch">
        <button id="lang-zh">中文</button>
        <button id="lang-en">EN</button>
      </div>
    </nav>
  </header>

  <main>
    <h1 data-i18n="chat.title">群聊</h1>

    <section id="chat-window">
      <ul id="messages"></ul>
    </section>

    <form id="chat-form">
      <input id="username" placeholder="昵称" required />
      <input id="message" placeholder="消息" required />
      <button type="submit" data-i18n="chat.send">发送</button>
    </form>
  </main>

  <script src="assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      App.init();
      Chat.init();
    });
  </script>
</body>
</html>
